[workspace]
channels = ["conda-forge"]
name = "pipeline"
platforms = ["osx-arm64"]
version = "0.1.0"

[tasks]
worker = { cmd = "python -m pipeline.src.chip_worker", cwd = ".." }

[dependencies]
jupyter = ">=1.1.1,<2"
geopandas = ">=1.1.3,<2"
ipywidgets = ">=8.1.8,<9"
pytorch = ">=2.2"
torchvision = ">=0.17"
numpy = ">=1.26"
pillow = ">=10"
scikit-learn = ">=1.4"
matplotlib = ">=3.8"
onnx = ">=1.15"
rasterio = ">=1.3"
shapely = ">=2.0"
pooch = ">=1.8"
rioxarray = ">=0.15"
libgdal-jp2openjpeg = ">=3.6"
libtiff = ">=4.5"
pyproj = ">=3.7"
pyyaml = ">=6.0"
python-duckdb = ">=1.3"

[pypi-dependencies]
segment-anything = { git = "https://github.com/facebookresearch/segment-anything.git" }
