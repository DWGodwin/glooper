[workspace]
channels = ["conda-forge"]
name = "server"
platforms = ["osx-arm64"]
version = "0.1.0"

[tasks]
serve = { cmd = "python -m server.main", cwd = ".." }

[dependencies]
python = ">=3.12"
fastapi = ">=0.115"
uvicorn = ">=0.34"
python-duckdb = ">=1.3"
pyproj = ">=3.7"
pyyaml = ">=6.0"
pillow = ">=10"
tifffile = ">=2024"
