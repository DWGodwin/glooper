[workspace]
channels = ["conda-forge"]
name = "server"
platforms = ["osx-arm64"]
version = "0.1.0"

[tasks]
serve = { cmd = "python -m server.main", cwd = ".." }

[dependencies]
python = ">=3.12"
fastapi = ">=0.115"
uvicorn = ">=0.34"
python-duckdb = ">=1.3"
pyproj = ">=3.7"
pyyaml = ">=6.0"
rasterio = ">=1.3"
pillow = ">=10"
shapely = ">=2.0"
geopandas = ">=1.0"
pooch = ">=1.8"
rioxarray = ">=0.15"
libgdal-jp2openjpeg = ">=3.6"
libtiff = ">=4.5"
