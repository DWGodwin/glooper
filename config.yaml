chip_size_m: 67.2
crs: "EPSG:32619"
bands: ["R", "G", "B", "NIR"]
rgb_bands: ["R", "G", "B"]
max_chips_per_request: 10000
db_path: "data/glooper.duckdb"
data_dir: "data/"

# Server: chip worker connection
worker_host: "localhost"
worker_port: 9100

chip_size_px: 448
sam_batch_size: 16          # SAM encoder batch size (lower if you hit OOM)

# Plugins
# plugins:
#   - name: dino
#     model: dinov2_vits14
#     input_size: 448
#     patch_size: 14
#   - name: cam
#     requires_embeddings: dino

# Vectorization: how binary masks become vector polygons
vectorization:
  strategy: simplify        # simplify | convex_hull
  tolerance_px: 1.5       # Douglas-Peucker tolerance in pixels (simplify only)
  min_area_px: 4            # drop components smaller than N pixels
#   max_vertices: null         # iteratively simplify until under this vertex count
#   class_overrides:           # per-class overrides (merged on top of base)
#     solar_panel:
#       strategy: min_rotated_rect
#       tolerance_px: 2

# Pipeline: imagery provider (read by the chip worker)
imagery_provider: mass_orthos
imagery_provider_config:
  year: 2023
# imagery_provider: cog
# imagery_provider_config:
#   cog_path: /path/to/imagery.tif
